<template id="act2-bot-template">
  <div data-composition-id="act2-bot" data-start="0" data-duration="7" data-width="1920" data-height="1080">
    <div class="scene-content">
      <!-- Teams-style chat window -->
      <div class="window" id="s2-window">
        <div class="header">
          <div class="avatar">R</div>
          <div class="header-text">
            <div class="name">Rakshak</div>
            <div class="status"><span class="dot"></span>Private &middot; End-to-end encrypted</div>
          </div>
        </div>

        <div class="chat">
          <!-- Bot message 1 -->
          <div class="msg bot" id="s2-m1">
            <div class="bubble">
              <div class="msg-text">Hi. I&rsquo;m Rakshak. Everything you share with me is confidential.</div>
            </div>
          </div>

          <!-- Bot message 2 -->
          <div class="msg bot" id="s2-m2">
            <div class="bubble">
              <div class="msg-text">Your HR, your manager, and your team can&rsquo;t see this conversation.</div>
            </div>
          </div>

          <!-- User message -->
          <div class="msg user" id="s2-m3">
            <div class="bubble">
              <div class="msg-text">Something happened last week. I&rsquo;m not sure what to do.</div>
            </div>
          </div>

          <!-- Typing indicator, becomes bot message 4 -->
          <div class="msg bot" id="s2-m4-typing">
            <div class="bubble bubble-typing">
              <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
            </div>
          </div>

          <div class="msg bot" id="s2-m4">
            <div class="bubble">
              <div class="msg-text">I&rsquo;m here. Take your time. We can go at whatever pace feels right.</div>
            </div>
          </div>
        </div>
      </div>

      <div class="caption" id="s2-caption">A private channel. Outside the reporting line.</div>
    </div>

    <style>
      [data-composition-id="act2-bot"] {
        width: 100%;
        height: 100%;
        background: #0b0b0e;
        color: #f5f1ea;
        font-family: "Inter", sans-serif;
        position: relative;
        overflow: hidden;
      }
      [data-composition-id="act2-bot"] .scene-content {
        position: relative;
        width: 100%;
        height: 100%;
      }
      [data-composition-id="act2-bot"] .window {
        position: absolute;
        left: 50%;
        top: 80px;
        transform: translateX(-50%);
        width: 1180px;
        background: #14141a;
        border: 1px solid #1f1d1a;
        border-radius: 10px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
        overflow: hidden;
      }
      [data-composition-id="act2-bot"] .header {
        padding: 24px 32px;
        border-bottom: 1px solid #1f1d1a;
        display: flex;
        align-items: center;
        gap: 20px;
      }
      [data-composition-id="act2-bot"] .avatar {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: #e8904a;
        color: #0b0b0e;
        font-family: "Fraunces", serif;
        font-weight: 600;
        font-size: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      [data-composition-id="act2-bot"] .name {
        font-family: "Inter", sans-serif;
        font-size: 26px;
        font-weight: 600;
        color: #f5f1ea;
        margin-bottom: 4px;
      }
      [data-composition-id="act2-bot"] .status {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 14px;
        letter-spacing: 0.08em;
        color: #6b6760;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      [data-composition-id="act2-bot"] .status .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #4ade80;
      }
      [data-composition-id="act2-bot"] .chat {
        padding: 32px 40px 40px;
        min-height: 600px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      [data-composition-id="act2-bot"] .msg {
        display: flex;
        opacity: 0;
      }
      [data-composition-id="act2-bot"] .msg.bot { justify-content: flex-start; }
      [data-composition-id="act2-bot"] .msg.user { justify-content: flex-end; }
      [data-composition-id="act2-bot"] .bubble {
        max-width: 720px;
        padding: 22px 28px;
        border-radius: 14px;
        font-family: "Inter", sans-serif;
        font-size: 28px;
        line-height: 1.45;
        color: #f5f1ea;
      }
      [data-composition-id="act2-bot"] .msg.bot .bubble {
        background: #1f1d1a;
        border-top-left-radius: 4px;
      }
      [data-composition-id="act2-bot"] .msg.user .bubble {
        background: #e8904a;
        color: #0b0b0e;
        border-top-right-radius: 4px;
      }
      [data-composition-id="act2-bot"] .bubble-typing {
        display: inline-flex;
        gap: 8px;
        padding: 22px 28px;
        min-width: 80px;
      }
      [data-composition-id="act2-bot"] .typing-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #6b6760;
      }
      [data-composition-id="act2-bot"] #s2-m4 { display: none; }

      [data-composition-id="act2-bot"] .caption {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 80px;
        text-align: center;
        font-family: "Fraunces", serif;
        font-style: italic;
        font-weight: 500;
        font-size: 42px;
        color: #e8904a;
        letter-spacing: -0.005em;
        opacity: 0;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        const tl = gsap.timeline({ paused: true });

        // Window enters
        tl.from("#s2-window", { y: 30, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.1);

        // Message cascade
        tl.to("#s2-m1", { opacity: 1, y: 0, duration: 0.35, ease: "power3.out" }, 0.7);
        tl.from("#s2-m1 .bubble", { y: 12, duration: 0.35, ease: "power3.out" }, 0.7);

        tl.to("#s2-m2", { opacity: 1, y: 0, duration: 0.35, ease: "power3.out" }, 1.55);
        tl.from("#s2-m2 .bubble", { y: 12, duration: 0.35, ease: "power3.out" }, 1.55);

        tl.to("#s2-m3", { opacity: 1, y: 0, duration: 0.35, ease: "power3.out" }, 2.6);
        tl.from("#s2-m3 .bubble", { y: 12, duration: 0.35, ease: "power3.out" }, 2.6);

        // Typing indicator
        tl.to("#s2-m4-typing", { opacity: 1, duration: 0.2, ease: "power2.out" }, 3.45);
        tl.to("#s2-m4-typing .typing-dot:nth-child(1)",
          { opacity: 0.35, yoyo: true, repeat: 3, duration: 0.3 }, 3.6);
        tl.to("#s2-m4-typing .typing-dot:nth-child(2)",
          { opacity: 0.35, yoyo: true, repeat: 3, duration: 0.3 }, 3.7);
        tl.to("#s2-m4-typing .typing-dot:nth-child(3)",
          { opacity: 0.35, yoyo: true, repeat: 3, duration: 0.3 }, 3.8);

        // Swap typing for real bubble
        tl.set("#s2-m4-typing", { display: "none" }, 4.7);
        tl.set("#s2-m4", { display: "flex" }, 4.7);
        tl.to("#s2-m4", { opacity: 1, duration: 0.3, ease: "power3.out" }, 4.7);
        tl.from("#s2-m4 .bubble", { y: 12, duration: 0.35, ease: "power3.out" }, 4.7);

        // Caption
        tl.to("#s2-caption", { opacity: 1, duration: 0.5, ease: "power3.out" }, 5.4);

        // Hard hold through scene end — re-assert final visible state
        tl.set(["#s2-m1", "#s2-m2", "#s2-m3", "#s2-m4"], { opacity: 1, clearProps: "transform" }, 6.95);
        tl.set("#s2-caption", { opacity: 1 }, 6.99);

        window.__timelines["act2-bot"] = tl;
      })();
    </script>
  </div>
</template>

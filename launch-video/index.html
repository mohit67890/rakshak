<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Rakshak — Launch</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0; width: 1920px; height: 1080px;
        overflow: hidden; background: #0b0b0e;
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"
         data-composition-id="main"
         data-start="0" data-duration="26"
         data-width="1920" data-height="1080">

      <div id="clip-act1"
           data-composition-id="act1-compose"
           data-composition-src="compositions/act1-compose.html"
           data-start="0" data-duration="7" data-track-index="2"></div>

      <div id="clip-act2"
           data-composition-id="act2-bot"
           data-composition-src="compositions/act2-bot.html"
           data-start="7" data-duration="7" data-track-index="2"></div>

      <div id="clip-act3"
           data-composition-id="act2b-switch"
           data-composition-src="compositions/act2b-switch.html"
           data-start="14" data-duration="6" data-track-index="2"></div>

      <div id="clip-act4"
           data-composition-id="act3-handoff"
           data-composition-src="compositions/act3-handoff.html"
           data-start="20" data-duration="6" data-track-index="2"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
